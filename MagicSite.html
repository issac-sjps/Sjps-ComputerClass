<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>魔法小學堂 — 科目索引</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#090b13;--card:#111421;--border:rgba(255,255,255,.07);
      --a1:#5e9dff;--a2:#b57bff;--g:#4ecca3;--y:#f5c542;--r:#ff6b6b;--o:#ff9a3c;
      --text:#e8eaf0;--muted:#7a7f9a;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse 60% 50% at 15% 40%,rgba(94,157,255,.07),transparent),
                 radial-gradient(ellipse 50% 40% at 85% 20%,rgba(181,123,255,.07),transparent),
                 radial-gradient(ellipse 40% 60% at 55% 85%,rgba(78,204,163,.05),transparent);
      pointer-events:none;z-index:0}
    .wrap{max-width:1080px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}

    /* Hero */
    .hero{text-align:center;padding:64px 16px 44px}
    .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);
      border:1px solid var(--border);border-radius:40px;padding:6px 18px;font-size:12px;
      color:var(--muted);margin-bottom:22px;letter-spacing:.5px}
    h1{font-family:'Space Grotesk','Noto Sans TC',sans-serif;font-size:clamp(2rem,5vw,3.4rem);
      font-weight:800;line-height:1.1;margin-bottom:10px;
      background:linear-gradient(135deg,#e8eaf0 20%,var(--a1) 60%,var(--a2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sub{color:var(--muted);font-size:.93rem;line-height:1.6;max-width:480px;margin:0 auto 28px}

    /* API key box */
    .apibox{background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:18px 22px;max-width:560px;margin:0 auto 24px}
    .apibox label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:7px}
    .apirow{display:flex;gap:8px}
    input.ak{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:9px;
      padding:9px 13px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;
      font-family:'Noto Sans TC',sans-serif}
    input.ak:focus{border-color:var(--a1)}
    input.ak::placeholder{color:var(--muted)}
    .hint{font-size:10.5px;color:var(--muted);margin-top:7px}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:9px;
      font-size:13.5px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;
      border:none;transition:all .16s;white-space:nowrap}
    .bp{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;
      box-shadow:0 4px 18px rgba(94,157,255,.3)}
    .bp:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 26px rgba(94,157,255,.45)}
    .bp:disabled{opacity:.45;cursor:not-allowed}
    .bg{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text)}
    .bg:hover{background:rgba(255,255,255,.11)}
    .ctrl{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:28px}

    /* Progress & Status */
    #pbar{max-width:460px;margin:0 auto 9px;height:3px;background:rgba(255,255,255,.08);
      border-radius:4px;overflow:hidden;display:none}
    #pfill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a2));transition:width .28s;width:0}
    #status{text-align:center;font-size:13px;color:var(--muted);min-height:22px;margin-bottom:26px}
    .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.15);
      border-top-color:var(--a1);border-radius:50%;animation:spin .6s linear infinite;
      vertical-align:middle;margin-right:5px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Pills */
    .pills{display:none;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:28px}
    .pill{padding:5px 14px;border-radius:40px;font-size:12px;font-weight:700;cursor:pointer;
      border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);transition:all .14s}
    .pill.on,.pill:hover{color:#fff;border-color:transparent}
    .pill.on[data-s="全部"]{background:linear-gradient(135deg,var(--a1),var(--a2))}
    .pill.on[data-s="國語"]{background:var(--r)}
    .pill.on[data-s="數學"]{background:var(--a1)}
    .pill.on[data-s="自然"]{background:var(--g)}
    .pill.on[data-s="社會"]{background:var(--y);color:#000}
    .pill.on[data-s="英語"]{background:var(--a2)}
    .pill.on[data-s="生活"]{background:var(--o)}
    .pill.on[data-s="健體"]{background:#00c9a7}

    /* Sections */
    .section{margin-bottom:34px;animation:fadeUp .35s both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .sh{display:flex;align-items:center;gap:11px;margin-bottom:13px}
    .si{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;
      justify-content:center;font-size:19px;flex-shrink:0}
    .st{font-size:1.1rem;font-weight:900}
    .sc{font-size:11px;color:var(--muted);background:rgba(255,255,255,.06);border-radius:40px;padding:3px 10px}

    /* Grade groups */
    .gg{margin-bottom:12px}
    .gl{font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.8px;
      text-transform:uppercase;margin-bottom:6px;padding-left:2px}

    /* Link grid */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}
    a.card{background:var(--card);border:1px solid var(--border);border-radius:10px;
      padding:12px 14px;text-decoration:none;color:var(--text);transition:all .16s;
      display:flex;flex-direction:column;gap:4px}
    a.card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.15);
      box-shadow:0 8px 20px rgba(0,0,0,.4)}
    a.card .cn{font-size:13px;font-weight:700;line-height:1.3}
    a.card .ci{font-size:9.5px;color:var(--muted);font-family:monospace}
    a.card .ar{font-size:10.5px;color:var(--muted);margin-top:auto;padding-top:4px}

    /* Log */
    #log{font-size:11px;color:var(--muted);max-height:110px;overflow-y:auto;
      background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;
      padding:9px 13px;margin-bottom:18px;display:none;font-family:monospace;line-height:1.6}

    .empty{text-align:center;padding:56px 20px;color:var(--muted)}
    .ei{font-size:44px;margin-bottom:12px}

    footer{text-align:center;padding:28px 16px;border-top:1px solid var(--border);
      font-size:11px;color:var(--muted);margin-top:36px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="badge">✨ 翰林出版 · magic.hle.com.tw</div>
    <h1>魔法小學堂<br/>科目連結索引</h1>
    <p class="sub">自動整理國小各年級、各科目的學習單元連結，點選即可直接開啟</p>
  </div>

  <input type="hidden" id="apiKey" value=""/>

  <div class="ctrl">
    <button class="btn bp" id="mainBtn" onclick="start()">🚀 載入所有連結</button>
    <button class="btn bg" onclick="toggleLog()">🪵 日誌</button>
    <button class="btn bg" onclick="copyAll()">📋 複製全部</button>
  </div>

  <div id="pbar"><div id="pfill"></div></div>
  <div id="status">點選「載入所有連結」開始</div>
  <div id="log"></div>

  <div class="pills" id="pills">
    <div class="pill on" data-s="全部" onclick="fil('全部',this)">全部</div>
    <div class="pill" data-s="國語" onclick="fil('國語',this)">📖 國語</div>
    <div class="pill" data-s="數學" onclick="fil('數學',this)">🔢 數學</div>
    <div class="pill" data-s="自然" onclick="fil('自然',this)">🔬 自然</div>
    <div class="pill" data-s="社會" onclick="fil('社會',this)">🌍 社會</div>
    <div class="pill" data-s="英語" onclick="fil('英語',this)">🔤 英語</div>
    <div class="pill" data-s="生活" onclick="fil('生活',this)">🌈 生活</div>
    <div class="pill" data-s="健體" onclick="fil('健體',this)">⚽ 健體</div>
  </div>

  <div id="content"></div>
</div>
<footer>本頁為 magic.hle.com.tw（翰林魔法小學堂）的科目索引，僅供教學導覽用途。</footer>

<script>
const BASE='https://magic.hle.com.tw/?contentId=';
const BL={1:'一上',2:'一下',3:'二上',4:'二下',5:'三上',6:'三下',7:'四上',8:'四下',9:'五上',10:'五下',11:'六上',12:'六下'};
const rng=(a,b)=>{const r=[];for(let i=a;i<=b;i++)r.push(i);return r};

// 已知/推測的科目格式定義
const DEFS=[
  {name:'國語',icon:'📖',color:'#ff6b6b',books:rng(1,12),units:rng(1,10),fmt:(b,u)=>`ECH_${b}_${u}`},
  {name:'數學',icon:'🔢',color:'#5e9dff',books:rng(1,12),units:rng(1,8), fmt:(b,u)=>`EMA-${b}-CH${u}`},
  {name:'自然',icon:'🔬',color:'#4ecca3',books:rng(1,12),units:rng(1,8), fmt:(b,u)=>`ENS_${b}_${u}`},
  {name:'社會',icon:'🌍',color:'#f5c542',books:rng(3,12),units:rng(1,8), fmt:(b,u)=>`ESS_${b}_${u}`},
  {name:'英語',icon:'🔤',color:'#b57bff',books:rng(3,12),units:rng(1,10),fmt:(b,u)=>`EEN_${b}_${u}`},
  {name:'生活',icon:'🌈',color:'#ff9a3c',books:rng(1,4), units:rng(1,8), fmt:(b,u)=>`ELF_${b}_${u}`},
  {name:'健體',icon:'⚽',color:'#00c9a7',books:rng(1,12),units:rng(1,6), fmt:(b,u)=>`EHP_${b}_${u}`},
];

let allData=[],cf='全部',loaded=false,logVis=false;

async function start(){
  if(loaded)return;
  const btn=document.getElementById('mainBtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>載入中...';
  pbar(0);log('開始...');

  const key=document.getElementById('apiKey').value.trim();
  if(key){
    log('有 API Key，呼叫 Claude API + web_search 搜尋真實 contentId...');
    await aiLoad(key);
  } else {
    log('無 API Key，使用內建推測格式...');
    await builtIn();
  }
}

// ── AI 模式 ──────────────────────────────────────────────────────
async function aiLoad(key){
  try{
    st('<span class="spin"></span> 正在請 Claude 搜尋真實連結，請稍候（約15-30秒）...');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`搜尋 magic.hle.com.tw 翰林魔法小學堂的所有 contentId 連結清單。

已知例子：
- ?contentId=EMA-8-CH1（數學第8冊第1章）
- ?contentId=ECH_0_4

請搜尋並推測所有可能的 contentId 格式，回覆純 JSON：
{
  "subjects": [
    {
      "name": "科目名（中文）",
      "icon": "emoji",
      "color": "#hex",
      "books": [
        { "book": 1, "label": "一上", "units": [{"id":"contentId","name":"第1單元"}] }
      ]
    }
  ]
}
只回傳 JSON，不加其他文字。`}]
      })
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const d=await res.json();
    const txt=(d.content||[]).map(b=>b.type==='text'?b.text:'').join('');
    log(`收到 ${txt.length} 字元回應`);
    const m=txt.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('無法提取 JSON');
    const p=JSON.parse(m[0]);
    allData=p.subjects||[];
    const tot=allData.reduce((a,s)=>a+s.books.reduce((b,g)=>b+g.units.length,0),0);
    done(tot,'AI 搜尋');
  } catch(e){
    log(`⚠️ AI 失敗(${e.message})，改用內建資料`);
    await builtIn();
  }
}

// ── 內建模式 ─────────────────────────────────────────────────────
async function builtIn(){
  allData=[];let tot=0;
  for(let i=0;i<DEFS.length;i++){
    const d=DEFS[i];
    pbar(Math.round(i/DEFS.length*90));
    st(`<span class="spin"></span> 建立 ${d.name} 索引...`);
    log(`科目: ${d.name}`);
    await sleep(60);
    const books=d.books.map(b=>{
      const units=d.units.map(u=>({id:d.fmt(b,u),name:`第 ${u} 單元`}));
      tot+=units.length;
      return{book:b,label:BL[b]||`第${b}冊`,units};
    });
    allData.push({name:d.name,icon:d.icon,color:d.color,books});
  }
  done(tot,'內建格式');
}

function done(tot,src){
  pbar(100);loaded=true;
  st(`✅ 已整理 <strong>${tot}</strong> 個連結（${src}）`);
  document.getElementById('pbar').style.display='none';
  document.getElementById('pills').style.display='flex';
  document.getElementById('mainBtn').innerHTML='✅ 載入完成';
  render();
}

// ── Render ───────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('content');
  let h='';
  allData.forEach((s,si)=>{
    if(cf!=='全部'&&s.name!==cf)return;
    const tot=(s.books||[]).reduce((a,g)=>a+(g.units||[]).length,0);
    h+=`<div class="section" style="animation-delay:${si*.06}s">
      <div class="sh">
        <div class="si" style="background:${s.color}22;border:1px solid ${s.color}44">${s.icon}</div>
        <div class="st">${s.name}</div>
        <div class="sc">${tot} 個</div>
      </div>`;
    (s.books||[]).forEach(g=>{
      h+=`<div class="gg"><div class="gl">${g.label}</div><div class="grid">`;
      (g.units||[]).forEach(u=>{
        h+=`<a class="card" href="${BASE}${u.id}" target="_blank" rel="noopener">
          <div class="cn">${u.name}</div>
          <div class="ci">${u.id}</div>
          <div class="ar">開啟 ↗</div></a>`;
      });
      h+=`</div></div>`;
    });
    h+=`</div>`;
  });
  el.innerHTML=h||`<div class="empty"><div class="ei">📭</div><p>沒有符合的科目</p></div>`;
}

function fil(s,el){cf=s;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));el.classList.add('on');if(loaded)render()}

function copyAll(){
  if(!loaded){alert('請先載入');return}
  const ls=[];
  allData.forEach(s=>s.books.forEach(g=>g.units.forEach(u=>ls.push(`${s.name}\t${g.label}\t${u.name}\t${BASE}${u.id}`))));
  navigator.clipboard.writeText(ls.join('\n')).then(()=>alert(`✅ 已複製 ${ls.length} 個連結`));
}

function toggleLog(){logVis=!logVis;document.getElementById('log').style.display=logVis?'block':'none'}
function log(m){const el=document.getElementById('log');el.innerHTML+=`<div>${new Date().toLocaleTimeString()} — ${m}</div>`;el.scrollTop=9999}
function st(m){document.getElementById('status').innerHTML=m}
function pbar(v){const b=document.getElementById('pbar');b.style.display='block';document.getElementById('pfill').style.width=v+'%'}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
</body>
</html>
