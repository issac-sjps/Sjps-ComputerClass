<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 電腦繪圖比賽評分系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #6C5CE7;
    --brand-light: #a29bfe;
    --brand-dark: #4834d4;
    --accent: #00b894;
    --accent-dark: #00896f;
    --danger: #e17055;
    --danger-dark: #c0392b;
    --warn: #fdcb6e;
    --bg: #f7f6ff;
    --surface: #ffffff;
    --surface2: #f0eeff;
    --border: #e2deff;
    --text: #2d2d3a;
    --text2: #6b6b80;
    --text3: #a0a0b0;
    --gold: #f9ca24;
    --silver: #b2bec3;
    --bronze: #e17055;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 16px rgba(108,92,231,0.10);
    --shadow-lg: 0 8px 32px rgba(108,92,231,0.16);
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  .site-header {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    color: #fff;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .site-header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 0.25rem; position: relative; }
  .site-header p { font-size: 0.9rem; opacity: 0.8; position: relative; }

  /* ── Layout ── */
  .container { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 6px;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow);
  }
  .tab {
    flex: 1;
    padding: 10px 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    border-radius: var(--radius-sm);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tab:hover { background: var(--surface2); color: var(--brand); }
  .tab.active { background: var(--brand); color: #fff; box-shadow: 0 2px 8px rgba(108,92,231,0.3); }

  /* ── Panel ── */
  .panel { display: none; animation: fadeIn 0.2s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.4rem;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1.1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon {
    width: 28px; height: 28px;
    background: var(--surface2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  /* ── Form ── */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.3px; text-transform: uppercase; }
  .form-group input,
  .form-group select {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--brand-light);
    box-shadow: 0 0 0 3px rgba(108,92,231,0.12);
  }
  .form-group input::placeholder { color: var(--text3); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn:hover { border-color: var(--brand-light); color: var(--brand); background: var(--surface2); }
  .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); color: #fff; }
  .btn-success { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-success:hover { background: var(--accent-dark); border-color: var(--accent-dark); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger-dark); border-color: var(--danger-dark); color: #fff; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }

  /* ── Works list ── */
  .work-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 7px;
    transition: border-color 0.15s;
  }
  .work-item:hover { border-color: var(--brand-light); }
  .work-info { display: flex; flex-direction: column; gap: 2px; }
  .work-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .work-meta { font-size: 12px; color: var(--text2); }
  .work-actions { display: flex; gap: 6px; }

  /* ── Score sliders ── */
  .criteria-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .criteria-row:last-child { border-bottom: none; }
  .criteria-label { font-size: 13px; font-weight: 500; color: var(--text2); width: 76px; flex-shrink: 0; }
  .criteria-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  .criteria-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--brand);
    box-shadow: 0 1px 6px rgba(108,92,231,0.4);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .criteria-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .criteria-slider::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--brand);
    border: none;
    cursor: pointer;
  }
  .criteria-val { font-size: 15px; font-weight: 700; color: var(--brand); width: 34px; text-align: right; }

  .total-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 14px; padding-top: 14px;
    border-top: 2px solid var(--surface2);
  }
  .total-label { font-size: 13px; color: var(--text2); }
  .total-score { font-size: 32px; font-weight: 700; color: var(--brand); }
  .total-score span { font-size: 15px; font-weight: 400; color: var(--text2); }

  /* ── Stats ── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin-bottom: 1.2rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num { font-size: 32px; font-weight: 700; color: var(--brand); line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--text2); font-weight: 500; }

  /* ── Rank table ── */
  .rank-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .rank-table th {
    padding: 9px 10px; text-align: left;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--text2);
    border-bottom: 2px solid var(--border);
  }
  .rank-table td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  .rank-table tr:last-child td { border-bottom: none; }
  .rank-table tr:hover td { background: var(--surface2); }

  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%;
    font-size: 12px; font-weight: 700;
  }
  .rank-1 { background: #fff3cd; color: #8a6800; }
  .rank-2 { background: #e8e8ee; color: #555; }
  .rank-3 { background: #fde8d8; color: #8a3d10; }
  .rank-other { background: var(--bg); color: var(--text2); }

  .grade-tag {
    display: inline-block; padding: 3px 9px;
    border-radius: 20px; font-size: 12px; font-weight: 700;
  }
  .grade-a { background: #d4edda; color: #155724; }
  .grade-b { background: #cce5ff; color: #004085; }
  .grade-c { background: #fff3cd; color: #856404; }
  .grade-d { background: #f8d7da; color: #721c24; }

  .score-bar-wrap {
    height: 6px; background: var(--border);
    border-radius: 3px; overflow: hidden; width: 70px;
  }
  .score-bar { height: 100%; background: linear-gradient(90deg, var(--brand-light), var(--brand)); border-radius: 3px; transition: width 0.5s ease; }

  /* ── Score Records ── */
  .score-record {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 13px;
    margin-bottom: 7px; display: flex; align-items: flex-start; justify-content: space-between;
  }
  .score-record-info { flex: 1; }
  .score-record-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .score-record-detail { font-size: 12px; color: var(--text2); }
  .score-record-score {
    font-size: 20px; font-weight: 700; color: var(--brand);
    background: var(--surface2); padding: 4px 10px;
    border-radius: var(--radius-sm); margin-left: 12px;
  }

  /* ── Empty State ── */
  .empty {
    text-align: center; padding: 2.5rem 1rem;
    color: var(--text3); font-size: 14px;
  }
  .empty::before { content: '📭'; display: block; font-size: 2rem; margin-bottom: 0.75rem; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 14px; font-weight: 500;
    color: var(--text);
    box-shadow: var(--shadow-lg);
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    max-width: 280px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { border-color: var(--accent); color: var(--accent-dark); }
  .toast.err { border-color: var(--danger); color: var(--danger-dark); }

  /* ── Badge ── */
  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 20px; font-size: 11px; font-weight: 600;
    background: var(--surface2); color: var(--brand);
  }

  /* ── Toolbar ── */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
  .toolbar-left { display: flex; align-items: center; gap: 8px; }

  /* ── Section header inside results ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .section-title { font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 6px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .stats-grid .stat-card:last-child { grid-column: 1 / -1; }
    .site-header h1 { font-size: 1.4rem; }
    .tab { font-size: 12px; padding: 8px 4px; }
    .rank-table th:nth-child(5),
    .rank-table td:nth-child(5) { display: none; }
    .rank-table th:nth-child(9),
    .rank-table td:nth-child(9) { display: none; }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>🎨 電腦繪圖比賽評分系統</h1>
  <p>管理參賽作品 · 進行評分 · 查看比賽結果</p>
</header>

<div class="container">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('works')">📋 作品管理</button>
    <button class="tab" onclick="switchTab('score')">✏️ 評分</button>
    <button class="tab" onclick="switchTab('results')">🏆 比賽結果</button>
  </div>

  <!-- ======================== 作品管理 ======================== -->
  <div class="panel active" id="panel-works">

    <div class="card">
      <div class="card-title">
        <span class="icon">➕</span> 新增參賽作品
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>作品名稱</label>
          <input type="text" id="inp-name" placeholder="例：山水畫">
        </div>
        <div class="form-group">
          <label>參賽者姓名</label>
          <input type="text" id="inp-author" placeholder="例：王小明">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>參賽組別</label>
          <select id="inp-group">
            <option>國小組</option>
            <option>國中組</option>
            <option>高中組</option>
            <option>社會組</option>
          </select>
        </div>
        <div class="form-group">
          <label>作品編號</label>
          <input type="text" id="inp-id" placeholder="例：A001">
        </div>
      </div>
      <button class="btn btn-primary" onclick="addWork()">➕ 新增作品</button>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="card-title" style="margin:0"><span class="icon">📋</span> 參賽作品列表</div>
          <span class="badge" id="works-count">0 件</span>
        </div>
        <button class="btn btn-sm btn-danger" onclick="clearAllWorks()">🗑 清空全部</button>
      </div>
      <div id="works-list"><div class="empty">尚無作品，請先新增參賽作品</div></div>
    </div>

  </div>

  <!-- ======================== 評分 ======================== -->
  <div class="panel" id="panel-score">

    <div class="card">
      <div class="card-title"><span class="icon">🎯</span> 選擇評分作品</div>
      <div class="form-row">
        <div class="form-group">
          <label>選擇作品</label>
          <select id="score-work-select">
            <option value="">-- 請選擇作品 --</option>
          </select>
        </div>
        <div class="form-group">
          <label>評審姓名</label>
          <input type="text" id="inp-judge" placeholder="評審姓名">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">📊</span> 評分項目（各項 0–100 分）</div>

      <div class="criteria-row">
        <span class="criteria-label">🎨 創意構思</span>
        <input type="range" class="criteria-slider" id="s1" min="0" max="100" value="70">
        <span class="criteria-val" id="v1">70</span>
      </div>
      <div class="criteria-row">
        <span class="criteria-label">⚙️ 技術表現</span>
        <input type="range" class="criteria-slider" id="s2" min="0" max="100" value="70">
        <span class="criteria-val" id="v2">70</span>
      </div>
      <div class="criteria-row">
        <span class="criteria-label">🌈 色彩運用</span>
        <input type="range" class="criteria-slider" id="s3" min="0" max="100" value="70">
        <span class="criteria-val" id="v3">70</span>
      </div>
      <div class="criteria-row">
        <span class="criteria-label">✨ 整體美感</span>
        <input type="range" class="criteria-slider" id="s4" min="0" max="100" value="70">
        <span class="criteria-val" id="v4">70</span>
      </div>
      <div class="criteria-row">
        <span class="criteria-label">💬 主題表達</span>
        <input type="range" class="criteria-slider" id="s5" min="0" max="100" value="70">
        <span class="criteria-val" id="v5">70</span>
      </div>

      <div class="total-row">
        <div>
          <div class="total-label">平均總分</div>
          <div class="total-score"><span id="total-score">70</span> <span>/ 100</span></div>
        </div>
        <button class="btn btn-primary" onclick="submitScore()">✅ 提交評分</button>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="card-title" style="margin:0"><span class="icon">📝</span> 已評分記錄</div>
        <button class="btn btn-sm btn-danger" onclick="clearAllScores()">🗑 清空記錄</button>
      </div>
      <div id="score-records"><div class="empty">尚無評分記錄</div></div>
    </div>

  </div>

  <!-- ======================== 比賽結果 ======================== -->
  <div class="panel" id="panel-results">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">參賽作品</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-scored">0</div>
        <div class="stat-label">已完成評分</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-avg">0</div>
        <div class="stat-label">平均分數</div>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <div class="section-title">🏆 比賽結果排名</div>
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="renderResults()">🔄 重新計算</button>
          <button class="btn btn-success" onclick="exportCSV()">📥 匯出 CSV</button>
        </div>
      </div>
      <div id="results-table"><div class="empty">尚無評分資料，請評審先進行評分</div></div>
    </div>

  </div>

</div><!-- /container -->

<div class="toast" id="toast"></div>

<script>
  // ── Data ──
  let works = JSON.parse(localStorage.getItem('cg-works') || '[]');
  let scores = JSON.parse(localStorage.getItem('cg-scores') || '[]');

  function save() {
    try {
      localStorage.setItem('cg-works', JSON.stringify(works));
      localStorage.setItem('cg-scores', JSON.stringify(scores));
    } catch(e) {}
  }

  // ── Tabs ──
  function switchTab(t) {
    const names = ['works', 'score', 'results'];
    document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', names[i] === t));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + t).classList.add('active');
    if (t === 'score') { renderScoreSelect(); renderScoreRecords(); }
    if (t === 'results') renderResults();
  }

  // ── Toast ──
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ── Sliders ──
  function updateScores() {
    const vals = ['s1','s2','s3','s4','s5'].map(id => +document.getElementById(id).value);
    vals.forEach((v, i) => document.getElementById('v' + (i+1)).textContent = v);
    document.getElementById('total-score').textContent = Math.round(vals.reduce((a,b) => a+b, 0) / 5);
  }
  ['s1','s2','s3','s4','s5'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateScores);
  });

  // ── Add Work ──
  function addWork() {
    const name   = document.getElementById('inp-name').value.trim();
    const author = document.getElementById('inp-author').value.trim();
    const group  = document.getElementById('inp-group').value;
    const id     = document.getElementById('inp-id').value.trim();
    if (!name || !author) { showToast('請填寫作品名稱與參賽者姓名', 'err'); return; }
    works.push({
      id: id || 'W' + String(works.length + 1).padStart(3, '0'),
      name, author, group,
      created: new Date().toLocaleDateString('zh-TW')
    });
    save(); renderWorks();
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-author').value = '';
    document.getElementById('inp-id').value = '';
    showToast('作品新增成功 ✓', 'ok');
  }

  // ── Render Works ──
  function renderWorks() {
    const el = document.getElementById('works-list');
    document.getElementById('works-count').textContent = works.length + ' 件';
    if (!works.length) { el.innerHTML = '<div class="empty">尚無作品，請先新增參賽作品</div>'; return; }
    el.innerHTML = works.map((w, i) => `
      <div class="work-item">
        <div class="work-info">
          <span class="work-name">${w.id} — ${w.name}</span>
          <span class="work-meta">${w.author} · ${w.group} · 新增於 ${w.created}</span>
        </div>
        <div class="work-actions">
          <button class="btn btn-sm btn-danger" onclick="deleteWork(${i})">刪除</button>
        </div>
      </div>`).join('');
  }

  function deleteWork(i) {
    if (!confirm('確定刪除「' + works[i].name + '」？相關評分也會一併刪除')) return;
    const wid = works[i].id;
    scores = scores.filter(s => s.workId !== wid);
    works.splice(i, 1);
    save(); renderWorks();
    showToast('已刪除', 'ok');
  }

  function clearAllWorks() {
    if (!works.length) { showToast('沒有作品可清除', 'err'); return; }
    if (!confirm('確定清空全部作品？評分記錄也會一併清除')) return;
    works = []; scores = [];
    save(); renderWorks();
    showToast('已清空全部資料', 'ok');
  }

  // ── Score Select ──
  function renderScoreSelect() {
    const sel = document.getElementById('score-work-select');
    sel.innerHTML = '<option value="">-- 請選擇作品 --</option>' +
      works.map(w => `<option value="${w.id}">${w.id} — ${w.name}（${w.author}）</option>`).join('');
  }

  // ── Submit Score ──
  function submitScore() {
    const wid   = document.getElementById('score-work-select').value;
    const judge = document.getElementById('inp-judge').value.trim();
    if (!wid)   { showToast('請選擇作品', 'err'); return; }
    if (!judge) { showToast('請填寫評審姓名', 'err'); return; }
    const vals = ['s1','s2','s3','s4','s5'].map(id => +document.getElementById(id).value);
    const avg  = Math.round(vals.reduce((a,b) => a+b, 0) / 5);
    const existing = scores.findIndex(x => x.workId === wid && x.judge === judge);
    const rec = {
      workId: wid, judge, avg,
      s1: vals[0], s2: vals[1], s3: vals[2], s4: vals[3], s5: vals[4],
      time: new Date().toLocaleString('zh-TW')
    };
    if (existing >= 0) {
      if (!confirm('此評審已對此作品評過分，是否覆蓋？')) return;
      scores[existing] = rec;
    } else {
      scores.push(rec);
    }
    save(); renderScoreRecords();
    showToast('評分提交成功 ✓', 'ok');
  }

  // ── Score Records ──
  function renderScoreRecords() {
    const el = document.getElementById('score-records');
    if (!scores.length) { el.innerHTML = '<div class="empty">尚無評分記錄</div>'; return; }
    el.innerHTML = scores.slice().reverse().map(s => {
      const w = works.find(x => x.id === s.workId);
      return `<div class="score-record">
        <div class="score-record-info">
          <div class="score-record-name">${s.workId}${w ? ' — ' + w.name : ''} <span style="font-weight:400;font-size:12px;color:var(--text2)">by ${s.judge}</span></div>
          <div class="score-record-detail">創意 ${s.s1} · 技術 ${s.s2} · 色彩 ${s.s3} · 美感 ${s.s4} · 主題 ${s.s5} &nbsp;|&nbsp; ${s.time}</div>
        </div>
        <div class="score-record-score">${s.avg}</div>
      </div>`;
    }).join('');
  }

  function clearAllScores() {
    if (!scores.length) { showToast('沒有記錄可清除', 'err'); return; }
    if (!confirm('確定清空全部評分記錄？')) return;
    scores = [];
    save(); renderScoreRecords();
    showToast('評分記錄已清空', 'ok');
  }

  // ── Grade ──
  function getGrade(n) {
    if (n >= 90) return ['A', 'grade-a'];
    if (n >= 75) return ['B', 'grade-b'];
    if (n >= 60) return ['C', 'grade-c'];
    return ['D', 'grade-d'];
  }

  // ── Results ──
  function renderResults() {
    const scored = works.filter(w => scores.some(s => s.workId === w.id));
    document.getElementById('stat-total').textContent  = works.length;
    document.getElementById('stat-scored').textContent = scored.length;
    const overallAvg = scored.length
      ? Math.round(scored.reduce((a, w) => {
          const ws = scores.filter(s => s.workId === w.id);
          return a + (ws.reduce((x, s) => x + s.avg, 0) / ws.length);
        }, 0) / scored.length)
      : 0;
    document.getElementById('stat-avg').textContent = overallAvg || 0;

    const el = document.getElementById('results-table');
    if (!scored.length) { el.innerHTML = '<div class="empty">尚無評分資料，請評審先進行評分</div>'; return; }

    const ranked = scored.map(w => {
      const ws   = scores.filter(s => s.workId === w.id);
      const wavg = Math.round(ws.reduce((x, s) => x + s.avg, 0) / ws.length);
      return { ...w, wavg, judgeCount: ws.length };
    }).sort((a, b) => b.wavg - a.wavg);

    el.innerHTML = `<div style="overflow-x:auto"><table class="rank-table">
      <thead><tr>
        <th>名次</th><th>編號</th><th>作品名稱</th><th>參賽者</th>
        <th>組別</th><th>評審數</th><th>平均分</th><th>等級</th><th>得分條</th>
      </tr></thead>
      <tbody>${ranked.map((w, i) => {
        const [g, gc] = getGrade(w.wavg);
        const badgeClass = ['rank-1','rank-2','rank-3'][i] || 'rank-other';
        const medal = ['🥇','🥈','🥉'][i] || '';
        return `<tr>
          <td><span class="rank-badge ${badgeClass}">${i + 1}</span></td>
          <td style="font-size:12px;color:var(--text2)">${w.id}</td>
          <td style="font-weight:600">${medal} ${w.name}</td>
          <td>${w.author}</td>
          <td><span class="badge">${w.group}</span></td>
          <td style="text-align:center">${w.judgeCount}</td>
          <td style="font-weight:700;color:var(--brand);font-size:16px">${w.wavg}</td>
          <td><span class="grade-tag ${gc}">${g}</span></td>
          <td><div class="score-bar-wrap"><div class="score-bar" style="width:${w.wavg}%"></div></div></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }

  // ── Export CSV ──
  function exportCSV() {
    const scored = works.filter(w => scores.some(s => s.workId === w.id));
    if (!scored.length) { showToast('沒有可匯出的資料', 'err'); return; }
    const ranked = scored.map(w => {
      const ws   = scores.filter(s => s.workId === w.id);
      const wavg = Math.round(ws.reduce((x, s) => x + s.avg, 0) / ws.length);
      return { ...w, wavg, judgeCount: ws.length };
    }).sort((a, b) => b.wavg - a.wavg);
    let csv = '\uFEFF名次,編號,作品名稱,參賽者,組別,評審數,平均分,等級\n';
    ranked.forEach((w, i) => {
      const [g] = getGrade(w.wavg);
      csv += `${i+1},${w.id},"${w.name}","${w.author}",${w.group},${w.judgeCount},${w.wavg},${g}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = '比賽結果_' + new Date().toLocaleDateString('zh-TW') + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('CSV 匯出成功 ✓', 'ok');
  }

  // ── Init ──
  renderWorks();
</script>
</body>
</html>
