<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂互動計時器</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { margin-top: 0; color: #2c3e50; }
        .mode-btn {
            font-size: 20px; padding: 10px 20px; margin: 5px;
            cursor: pointer; border: 2px solid #3498db; border-radius: 8px;
            background: white; color: #3498db; font-weight: bold;
        }
        .mode-btn.active { background: #3498db; color: white; }
        
        #timer-display {
            font-size: 140px; font-weight: bold; margin: 20px 0;
            color: #e74c3c; font-family: monospace;
        }
        
        .controls button {
            font-size: 24px; padding: 10px 20px; margin: 5px; cursor: pointer;
            border: none; border-radius: 8px; color: white; transition: 0.2s;
        }
        .btn-start { background-color: #2ecc71; }
        .btn-pause { background-color: #f39c12; }
        .btn-reset { background-color: #95a5a6; }
        .btn-add-time { background-color: #9b59b6; }
        .controls button:hover { opacity: 0.8; }

        .setup-area { margin: 15px 0; font-size: 20px; }
        .setup-area input { font-size: 20px; width: 60px; text-align: center; }

        /* 快速設定按鈕的樣式 */
        .quick-set { margin: 20px 0; }
        .quick-btn {
            font-size: 18px; padding: 10px 15px; margin: 5px; cursor: pointer;
            border: 2px solid #16a085; border-radius: 8px; background: #e8f8f5; 
            color: #16a085; font-weight: bold; transition: 0.2s;
        }
        .quick-btn:hover { background: #16a085; color: white; }
        .score-btn {
            font-size: 20px; padding: 5px 15px; margin: 2px; cursor: pointer;
            border: none; border-radius: 5px; background: #34495e; color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⏱️ 課堂互動計時器</h1>
    
    <div>
        <button id="btn-down" class="mode-btn active" onclick="setMode('down')">倒數計時</button>
        <button id="btn-up" class="mode-btn" onclick="setMode('up')">正計時</button>
    </div>

    <div id="setup-area" class="setup-area">
        <div class="quick-set">
            快速設定：
            <button class="quick-btn" onclick="setQuickTime(5)">5 分</button>
            <button class="quick-btn" onclick="setQuickTime(10)">10 分</button>
            <button class="quick-btn" onclick="setQuickTime(15)">15 分</button>
            <button class="quick-btn" onclick="setQuickTime(20)">20 分</button>
            <button class="quick-btn" onclick="setQuickTime(25)">25 分</button>
            <button class="quick-btn" onclick="setQuickTime(30)">30 分</button>
        </div>
        
        <div style="margin-top: 15px;">
            自訂時間：
            <input type="number" id="set-min" value="5" min="0"> 分 
            <input type="number" id="set-sec" value="0" min="0" max="59"> 秒
            <button class="score-btn" onclick="applyTime()">設定</button>
        </div>
    </div>

    <div id="timer-display">05:00</div>

    <div class="controls">
        <button class="btn-start" onclick="startTimer()">▶ 開始</button>
        <button class="btn-pause" onclick="pauseTimer()">⏸ 暫停</button>
        <button class="btn-reset" onclick="resetTimer()">🔄 重置</button>
        <button class="btn-add-time" onclick="addSeconds(10)">+10秒</button>
        <button class="btn-add-time" onclick="addSeconds(30)">+30秒</button>
    </div>
</div>

<script>
    let timerInterval = null;
    let totalSeconds = 300; // 預設 5 分鐘
    let currentMode = 'down'; // 'up' 或 'down'
    let isRunning = false;

    // 格式化時間 (mm:ss)
    function formatTime(seconds) {
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
    }

    // 更新畫面時間
    function updateDisplay() {
        document.getElementById("timer-display").innerText = formatTime(totalSeconds);
    }

    // 語音提醒
    function playTimeUpSound() {
        if ('speechSynthesis' in window) {
            // 讓語音連續講三次
            let msg = new SpeechSynthesisUtterance("時間到囉！ 時間到囉！ 時間到囉！");
            msg.lang = 'zh-TW';
            msg.rate = 1.0; 
            window.speechSynthesis.speak(msg);
        } else {
            alert("時間到囉！ 時間到囉！ 時間到囉！"); 
        }
    }

    // 切換模式 (正計時/倒數)
    function setMode(mode) {
        pauseTimer();
        currentMode = mode;
        
        document.getElementById("btn-up").classList.remove("active");
        document.getElementById("btn-down").classList.remove("active");
        document.getElementById("btn-" + mode).classList.add("active");

        let setupArea = document.getElementById("setup-area");
        if (mode === 'up') {
            setupArea.style.display = "none";
            totalSeconds = 0;
        } else {
            setupArea.style.display = "block";
            applyTime();
        }
        updateDisplay();
    }

    // 套用輸入的時間 (倒數模式用)
    function applyTime() {
        let m = parseInt(document.getElementById("set-min").value) || 0;
        let s = parseInt(document.getElementById("set-sec").value) || 0;
        totalSeconds = (m * 60) + s;
        updateDisplay();
    }

    // 快速設定時間
    function setQuickTime(minutes) {
        pauseTimer(); // 設定時間時先暫停
        document.getElementById("set-min").value = minutes;
        document.getElementById("set-sec").value = 0;
        totalSeconds = minutes * 60;
        updateDisplay();
    }

    // 開始計時
    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        timerInterval = setInterval(() => {
            if (currentMode === 'up') {
                totalSeconds++;
            } else {
                if (totalSeconds > 0) {
                    totalSeconds--;
                } else {
                    pauseTimer();
                    playTimeUpSound();
                    return;
                }
            }
            updateDisplay();
        }, 1000);
    }

    // 暫停計時
    function pauseTimer() {
        isRunning = false;
        clearInterval(timerInterval);
    }

    // 重置計時
    function resetTimer() {
        pauseTimer();
        if (currentMode === 'up') {
            totalSeconds = 0;
        } else {
            applyTime();
        }
        updateDisplay();
    }

    // 隨時加秒數
    function addSeconds(sec) {
        totalSeconds += sec;
        if(totalSeconds < 0) totalSeconds = 0; 
        updateDisplay();
    }

    // 初始化
    updateDisplay();
</script>

</body>
</html>
