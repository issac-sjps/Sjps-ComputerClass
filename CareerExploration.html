<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未來英雄學院 - 深度職涯探索系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B; --secondary: #4ECDC4; --accent: #FFE66D;
            --bg: #F0F4F8; --text: #2D3436; --white: #FFFFFF;
            --done: #2ECC71; --undone: #D1D8E0;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #game-container { background: var(--white); max-width: 850px; margin: 0 auto; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* 導航跳轉點 */
        .nav-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
        .dot { width: 30px; height: 30px; border-radius: 50%; background: var(--undone); display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--primary); transform: scale(1.2); }
        .dot.completed { background: var(--done); }

        h2 { font-size: 1.6rem; color: var(--text); margin-bottom: 25px; line-height: 1.5; text-align: center; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        
        .btn { padding: 18px; border-radius: 12px; border: 2px solid #E0E0E0; background: white; text-align: left; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .btn:hover { border-color: var(--secondary); background: #F7FFFE; }
        .btn.selected { border-color: var(--primary); background: #FFF5F5; }

        .nav-controls { display: flex; justify-content: space-between; margin-top: 30px; }
        .control-btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .prev-btn { background: #BDC3C7; color: white; }
        .submit-btn { background: var(--done); color: white; display: none; }

        /* 結果頁面樣式 */
        .result-card { display: none; animation: fadeIn 0.8s; }
        .career-section { background: #F9FAFB; border-radius: 15px; padding: 25px; margin-top: 20px; border-left: 10px solid var(--secondary); }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .info-box { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .badge { display: inline-block; background: var(--accent); padding: 3px 10px; border-radius: 5px; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; }
        
        .real-talk { background: #FFF9F0; border: 1px dashed #E67E22; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .search-keywords { background: #E0F7FA; padding: 15px; border-radius: 10px; margin-top: 15px; }
        
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1 style="text-align: center; color: var(--primary);">🎯 未來英雄：深度職涯探索</h1>
        <p style="text-align: center;">這是一個專業的探索系統。我們不只告訴你職業，還會分析你的選擇背後代表的「天賦」與現實生活中的挑戰。</p>
        <button class="control-btn submit-btn" style="display: block; margin: 30px auto; width: 200px;" onclick="startQuiz()">開始深度測驗</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="nav-dots" id="nav-dots"></div>
        <h2 id="question-text">載入中...</h2>
        <div id="options-container" class="options-grid"></div>
        
        <div class="nav-controls">
            <button class="control-btn prev-btn" id="prev-btn" onclick="prevQuestion()">← 上一題</button>
            <button class="control-btn submit-btn" id="final-submit" onclick="showFinalResult()">送出評估報告 →</button>
        </div>
    </div>

    <div id="result-screen" class="result-card">
        <h1 id="top-title" style="text-align: center; color: var(--secondary);">你的職涯探索報告</h1>
        
        <div class="info-box" style="border-top: 5px solid var(--primary);">
            <h3>🔍 性格特質行為分析</h3>
            <p id="behavior-analysis"></p>
        </div>

        <div id="career-recommendations"></div>

        <button class="control-btn prev-btn" style="width: 100%; margin-top: 30px;" onclick="location.reload()">重新進行探索</button>
    </div>
</div>

<script>
    const questions = [
        { q: "1. 當你拿到一組複雜的樂高積木時：", options: [
            {t:"照說明書精準拼好", y:"C", reason:"你展現了『精準執行』與『尊重規則』的特質。"},
            {t:"全部拆掉做成飛行船", y:"A", reason:"你擁有『破壞式創新』與『視覺空間感』。"},
            {t:"研究零件的卡榫原理", y:"I", reason:"你具備『分析思考』，喜歡探究事物底層運作。"},
            {t:"找兩位同學分工合作", y:"S", reason:"你具備『團隊協作』與『人力資源管理』雛形。"}
        ]},
        { q: "2. 在科博館看到一個壞掉的演示機器：", options: [
            {t:"找工具試著修好它", y:"R", reason:"你對『機械修復』有天生渴望，不懼怕動手實作。"},
            {t:"分析它在哪個環節出錯", y:"I", reason:"你擁有『除錯邏輯』，是工程師的核心特質。"},
            {t:"畫下機器的構造圖", y:"A", reason:"你習慣透過『圖像記錄』來理解複雜世界。"},
            {t:"去通知館員並幫忙引導路人", y:"E", reason:"你展現了『危機處理』與『主動服務』的領導力。"}
        ]},
        { q: "3. 班級要辦義賣活動，你最想？", options: [
            {t:"負責上台喊價推銷", y:"E", reason:"你具備『溝通說服』與『市場敏感度』。"},
            {t:"計算成本與找錢", y:"C", reason:"你擁有『財務管理』與『數據精確度』。"},
            {t:"設計漂亮的攤位佈置", y:"A", reason:"你具備『品牌視覺設計』與『審美美感』。"},
            {t:"負責把商品分類擺正", y:"C", reason:"你展現了『流程優化』與『環境管理』能力。"}
        ]},
        // ... 此處簡化為5題以示範邏輯，實際可擴充至15題
        { q: "4. 如果要你寫一個關於「未來」的專題報告：", options: [
            {t:"調查大家最想買的產品", y:"E", reason:"你關注『市場趨勢』與『人群需求』。"},
            {t:"研究氣候變遷的科學數據", y:"I", reason:"你依賴『實證數據』來建立論點。"},
            {t:"寫一個關於機器人的小說", y:"A", reason:"你擅長『敘事表達』與『劇本開發』。"},
            {t:"設計一個照顧老人的方案", y:"S", reason:"你具備『社會關懷』與『服務流程設計』能力。"}
        ]},
        { q: "5. 假日去爬山迷路了，你的第一動作：", options: [
            {t:"觀察植物生長方向找路", y:"I", reason:"你具備『環境偵查』與『知識應用』能力。"},
            {t:"冷靜分配大家攜帶的水量", y:"E", reason:"你在壓力下展現『決策權』與『資源統籌』。"},
            {t:"安慰哭泣的同學", y:"S", reason:"你擁有『心理韌性』與『情緒安撫』能力。"},
            {t:"動手做標記避免繞圈", y:"R", reason:"你習慣透過『實體標記』解決當下生存問題。"}
        ]}
    ];

    const careerData = {
        "R": {
            type: "實作英雄 (Realistic)",
            jobs: ["自動化機械工程師", "五星級主廚", "外科醫生"],
            traits: "動手能力強、空間感好、務實、解決實際問題。",
            skills: "工具操作、精密組裝、體能耐力。",
            subjects: "數學、自然科學、工藝/生活科技。",
            pros: "成品看得見摸得著，成就感直接；專業技術愈老愈吃香。",
            cons: "工作環境可能較嘈雜或在高溫處；體力消耗大，容易累積職業傷病。",
            keywords: "精密工程, 永續建築, 智慧製造"
        },
        "I": {
            type: "智慧學者 (Investigative)",
            jobs: ["數據科學家", "藥物研發員", "天文學家"],
            traits: "邏輯力強、愛問為什麼、獨立思考、觀察細膩。",
            skills: "程式語法、統計分析、實驗設計。",
            subjects: "物理、化學、高等數學、英文（讀論文用）。",
            pros: "工作時間通常較穩定；解決難題時的成就感無與倫比。",
            cons: "需要長時間盯著電腦或顯微鏡，眼力與耐力壓力大；成果有時要好幾年才出來。",
            keywords: "人工智慧, 基因編輯, 量子力學"
        },
        "A": {
            type: "創意魔法師 (Artistic)",
            jobs: ["遊戲開發設計師", "影視編劇", "室內設計師"],
            traits: "想像力豐富、直覺強、不喜歡死板規矩、情感細膩。",
            skills: "視覺美感、敘事能力、數位創作工具(如PS, Blender)。",
            subjects: "美術、音樂、語文、歷史（靈感來源）。",
            pros: "工作內容多元不枯燥；可以實現自我夢想，影響人們的感受。",
            cons: "接案初期收入可能不穩定；經常需要熬夜趕稿或應付客戶的改稿需求。",
            keywords: "使用者體驗(UX), 元宇宙設計, 視覺傳達"
        },
        "S": {
            type: "暖心領航員 (Social)",
            jobs: ["特教老師", "心理諮商師", "非營利組織負責人"],
            traits: "同理心高、擅長溝通、喜歡教學、耐心十足。",
            skills: "情緒覺察、口語表達、活動企劃能力。",
            subjects: "社會科、輔導活動、語文表達。",
            pros: "感受到被需要，社交回饋感強；人際關係技能能應用在生活的方方面面。",
            cons: "容易接收到他人的負面情緒導致心累；需要處理複雜的人際糾紛。",
            keywords: "社會創新, 心理健康, 多元共融(DEI)"
        },
        "E": {
            type: "果敢領袖 (Enterprising)",
            jobs: ["科技創業家", "行銷總監", "政治與外交家"],
            traits: "冒險精神、充滿活力、說服力強、抗壓性高。",
            skills: "演講辯論、談判技巧、財務預算控管。",
            subjects: "公民與社會、經濟、英文（談判用）。",
            pros: "收入潛力最高；擁有決策權，可以改變產業現狀。",
            cons: "工作壓力極大，通常沒有下班時間；需要承擔決策錯誤造成的財務損失。",
            keywords: "數位轉型, 風險管理, 商業開發(BD)"
        },
        "C": {
            type: "秩序守護者 (Conventional)",
            jobs: ["金融風險分析師", "律師事務所高級秘書", "物流供應鏈經理"],
            traits: "細心、組織能力強、可靠、重視效率。",
            skills: "文書處理、資料庫分析、專案進度追蹤。",
            subjects: "數學、會計、法律常識。",
            pros: "工作環境穩定安全；是組織的靈魂，每個人都需要你的幫助。",
            cons: "工作內容較固定重複，可能感到枯燥；對錯誤的容忍度極低，壓力來源於精確度。",
            keywords: "區塊鏈應用, 大數據審計, 流程自動化"
        }
    };

    let currentIdx = 0;
    let userSelections = new Array(questions.length).fill(null);

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderNav();
        renderQuestion();
    }

    function renderNav() {
        const nav = document.getElementById('nav-dots');
        nav.innerHTML = '';
        questions.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `dot ${i === currentIdx ? 'active' : ''} ${userSelections[i] !== null ? 'completed' : ''}`;
            dot.innerText = i + 1;
            dot.onclick = () => jumpToQuestion(i);
            nav.appendChild(dot);
        });
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = `btn ${userSelections[currentIdx] === i ? 'selected' : ''}`;
            btn.innerText = opt.t;
            btn.onclick = () => selectOption(i);
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('final-submit').style.display = userSelections.every(s => s !== null) ? 'block' : 'none';
    }

    function selectOption(optIdx) {
        userSelections[currentIdx] = optIdx;
        renderNav();
        renderQuestion();
        if (currentIdx < questions.length - 1) {
            setTimeout(() => { currentIdx++; renderNav(); renderQuestion(); }, 300);
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) { currentIdx--; renderNav(); renderQuestion(); }
    }

    function jumpToQuestion(idx) {
        currentIdx = idx;
        renderNav();
        renderQuestion();
    }

    function showFinalResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').style.display = 'block';

        let counts = { R:0, I:0, A:0, S:0, E:0, C:0 };
        let reasons = [];

        userSelections.forEach((selIdx, qIdx) => {
            const opt = questions[qIdx].options[selIdx];
            counts[opt.y]++;
            reasons.push(opt.reason);
        });

        // 找到最高分的類別
        let topType = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        const data = careerData[topType];

        document.getElementById('behavior-analysis').innerHTML = `根據你的回答，我們發現：<br>● ${reasons.slice(0, 3).join('<br>● ')}`;
        
        const recArea = document.getElementById('career-recommendations');
        recArea.innerHTML = `
            <div class="career-section">
                <h2>最適合你的英雄路徑：${data.type}</h2>
                <div class="info-box"><strong>核心特質：</strong>${data.traits}</div>
                
                <div class="grid-info">
                    <div class="info-box">
                        <span class="badge">推薦職業</span>
                        <ul style="padding-left:20px">${data.jobs.map(j => `<li>${j}</li>`).join('')}</ul>
                    </div>
                    <div class="info-box">
                        <span class="badge">關鍵技能與學科</span>
                        <p><strong>學科：</strong>${data.subjects}</p>
                        <p><strong>技能：</strong>${data.skills}</p>
                    </div>
                </div>

                <div class="grid-info">
                    <div class="info-box" style="color:#27ae60">
                        <span class="badge" style="background:#2ecc71; color:white">職場優點</span><br>${data.pros}
                    </div>
                    <div class="info-box" style="color:#e67e22">
                        <span class="badge" style="background:#e67e22; color:white">現實挑戰</span><br>${data.cons}
                    </div>
                </div>

                <div class="search-keywords">
                    <strong>🔍 想要深入探索嗎？</strong><br>
                    建議在 YouTube 或圖書館搜尋關鍵字：<br>
                    <code style="background:#fff; padding:2px 5px; border-radius:4px">${data.keywords}</code>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
