<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未來英雄學院 - 專業職涯引導系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #FF6B6B; --secondary: #4ECDC4; --accent: #FFE66D;
            --bg: #F0F4F8; --text: #2D3436; --white: #FFFFFF;
            --done: #2ECC71; --undone: #D1D8E0;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #game-container { background: var(--white); max-width: 900px; margin: 0 auto; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* 導航跳轉點 */
        .nav-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
        .dot { width: 30px; height: 30px; border-radius: 50%; background: var(--undone); display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--primary); transform: scale(1.2); }
        .dot.completed { background: var(--done); }

        h2 { font-size: 1.4rem; color: var(--text); margin-bottom: 25px; line-height: 1.5; text-align: center; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        
        .btn { padding: 16px 20px; border-radius: 12px; border: 2px solid #E0E0E0; background: white; text-align: left; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        .btn:hover { border-color: var(--secondary); background: #F7FFFE; transform: translateX(5px); }
        .btn.selected { border-color: var(--primary); background: #FFF5F5; }

        .nav-controls { display: flex; justify-content: space-between; margin-top: 30px; }
        .control-btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .prev-btn { background: #BDC3C7; color: white; }
        .submit-btn { background: var(--done); color: white; display: none; }

        /* 結果頁面樣式 */
        .result-card { display: none; animation: fadeIn 0.8s; }
        .career-section { border-radius: 15px; margin-top: 20px; }
        .info-box { background: #F9FAFB; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        .badge { display: inline-block; background: var(--accent); padding: 4px 12px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold; color: #d35400; }
        
        /* 條列式優缺點 */
        .pros-cons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .list-item { margin-bottom: 8px; font-size: 0.95rem; line-height: 1.6; }
        .check-icon { color: #27ae60; margin-right: 5px; }
        .warn-icon { color: #e67e22; margin-right: 5px; }

        /* 任務與名人 */
        .mission-box { background: #FFF9E6; border: 2px dashed #F1C40F; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .famous-box { background: #E8F8F5; padding: 20px; border-radius: 12px; margin-top: 20px; }
        
        /* 關鍵字連結 */
        .kw-tag { display: inline-block; background: white; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--secondary); margin: 4px; color: var(--secondary); text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .kw-tag:hover { background: var(--secondary); color: white; transform: scale(1.1); }

        .chart-container { width: 100%; max-width: 400px; margin: 0 auto; }

        /* 列印優化 */
        @media print {
            .nav-controls, .prev-btn, .nav-dots, .control-btn { display: none !important; }
            body { background: white; }
            #game-container { box-shadow: none; border: none; max-width: 100%; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1 style="text-align: center; color: var(--primary);">🚀 未來英雄學院：深度職涯任務</h1>
        <p style="text-align: center; font-size: 1.1rem; color: #666;">親愛的同學，你準備好探索自己的隱藏天賦了嗎？<br>這場 15 題的冒險將為你揭開通往未來的路徑。</p>
        <button class="control-btn" style="background: var(--primary); color: white; display: block; margin: 30px auto; width: 220px; padding: 15px; font-size: 1.2rem;" onclick="startQuiz()">開始我的探索報告</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="nav-dots" id="nav-dots"></div>
        <h2 id="question-text">正在載入冒題...</h2>
        <div id="options-container" class="options-grid"></div>
        
        <div class="nav-controls">
            <button class="control-btn prev-btn" id="prev-btn" onclick="prevQuestion()">← 返回上一題</button>
            <button class="control-btn submit-btn" id="final-submit" onclick="showFinalResult()">生成我的英雄報告 →</button>
        </div>
    </div>

    <div id="result-screen" class="result-card">
        <h1 style="text-align: center; color: var(--secondary); margin-bottom: 5px;">🌟 探索報告：<span id="job-type-name"></span></h1>
        <p style="text-align: center; color: #888; margin-bottom: 30px;">測驗日期：<span id="current-date"></span></p>
        
        <div style="display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: center;">
            <div class="chart-container"><canvas id="radarChart"></canvas></div>
            <div style="flex: 1; min-width: 300px;">
                <div class="info-box" style="border-left: 5px solid var(--primary);">
                    <h3 style="margin-top:0;">🔍 你的天賦解析</h3>
                    <p id="behavior-analysis" style="font-size: 0.95rem;"></p>
                </div>
            </div>
        </div>

        <div id="career-recommendations"></div>

        <div class="nav-controls" style="margin-top: 40px;">
            <button class="control-btn" style="background: #34495e; color: white;" onclick="window.print()">🖨️ 列印/儲存為 PDF 證書</button>
            <button class="control-btn" style="background: var(--primary); color: white;" onclick="location.reload()">重新測驗</button>
        </div>
    </div>
</div>

<script>
    const questions = [

            keywords: "社會創新, 心理健康, 永續經營ESG, 多元包容"
        },
        "E": {
            type: "果敢領袖 (Enterprising)",
            jobs: ["科技創業家", "行銷總監", "產品經理(PM)", "外交官"],
            famous: "賈伯斯 Steve Jobs、歐普拉",
            pros: ["擁有高度的決策權與主導感", "收入增長潛力最高", "生活充滿挑戰與變動，極富冒險感"],
            cons: ["必須承擔失敗與賠錢的風險", "工作與生活很難切分開來", "需要經常面對衝突與高壓談判"],
            mission: "下週跟老師爭取擔任班級或小組的負責人，嘗試規劃一個大家都能參與的小活動！",
            keywords: "商業模式, 風險管理, 演講溝通, 敏捷管理"
        },
        "C": {
            type: "秩序守護者 (Conventional)",
            jobs: ["資安分析師", "精算師", "物流專家", "律師"],
            famous: "股神 巴菲特、蘋果執行長 Tim Cook",
            pros: ["工作穩定性最高，受到企業高度信任", "專業度極強，隨著資歷薪資穩定成長", "生活作息非常有規律"],
            cons: ["工作內容重複性較高，可能感到單調", "對精確度要求極高，不能出錯的壓力大", "通常需要坐在辦公室處理大量數據"],
            mission: "將自己的書桌或房間進行一次徹底的分類整理，並畫出一張屬於自己的作息時間表！",
            keywords: "區塊鏈, 供應鏈管理, 資訊安全, 資料庫"
        }
    };

    let currentIdx = 0;
    let userSelections = new Array(questions.length).fill(null);
    let radarChartInstance = null;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderNav();
        renderQuestion();
    }

    function renderNav() {
        const nav = document.getElementById('nav-dots');
        nav.innerHTML = '';
        questions.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = `dot ${i === currentIdx ? 'active' : ''} ${userSelections[i] !== null ? 'completed' : ''}`;
            dot.innerText = i + 1;
            dot.onclick = () => jumpToQuestion(i);
            nav.appendChild(dot);
        });
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = `btn ${userSelections[currentIdx] === i ? 'selected' : ''}`;
            btn.innerText = opt.t;
            btn.onclick = () => selectOption(i);
            container.appendChild(btn);
        });

        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('final-submit').style.display = userSelections.every(s => s !== null) ? 'block' : 'none';
    }

    function selectOption(optIdx) {
        userSelections[currentIdx] = optIdx;
        renderNav();
        renderQuestion();
        if (currentIdx < questions.length - 1) {
            setTimeout(() => { currentIdx++; renderNav(); renderQuestion(); }, 200);
        }
    }

    function prevQuestion() { if (currentIdx > 0) { currentIdx--; renderNav(); renderQuestion(); } }
    function jumpToQuestion(idx) { currentIdx = idx; renderNav(); renderQuestion(); }

    function showFinalResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('current-date').innerText = new Date().toLocaleDateString();

        let counts = { R:0, I:0, A:0, S:0, E:0, C:0 };
        let reasons = [];
        userSelections.forEach((selIdx, qIdx) => {
            const opt = questions[qIdx].options[selIdx];
            counts[opt.y]++;
            reasons.push(opt.reason);
        });

        drawRadarChart(counts);
        let topType = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        const data = careerData[topType];
        document.getElementById('job-type-name').innerText = data.type;

        // 行為解析（隨機3條）
        const selectedReasons = reasons.sort(() => 0.5 - Math.random()).slice(0, 3);
        document.getElementById('behavior-analysis').innerHTML = `💡 <b>從測驗看你的天賦：</b><br>● ${selectedReasons.join('<br>● ')}`;

        const recArea = document.getElementById('career-recommendations');
        recArea.innerHTML = `
            <div class="career-section">
                <div class="pros-cons-grid">
                    <div class="info-box">
                        <span class="badge">🌟 職場優點分析</span>
                        ${data.pros.map(p => `<div class="list-item"><span class="check-icon">✓</span> ${p}</div>`).join('')}
                    </div>
                    <div class="info-box">
                        <span class="badge" style="background:#e67e22; color:white">⚠️ 現實挑戰與缺點</span>
                        ${data.cons.map(c => `<div class="list-item"><span class="warn-icon">⚠</span> ${c}</div>`).join('')}
                    </div>
                </div>

                <div class="info-box">
                    <span class="badge" style="background:#3498db; color:white">🏆 英雄榜：代表人物</span>
                    <p><b>你可以搜尋：</b> ${data.famous}</p>
                </div>

                <div class="mission-box">
                    <h3 style="margin-top:0;">🎯 本週英雄任務</h3>
                    <p style="font-size:1.1rem; color:#d35400;">${data.mission}</p>
                </div>

                <div class="info-box">
                    <span class="badge" style="background:#2ecc71; color:white">🔍 推薦搜尋關鍵字 (點擊開啟搜尋)</span><br>
                    <div style="margin-top:10px;">
                        ${data.keywords.split(',').map(k => `
                            <a href="https://www.google.com/search?q=${k.trim()}" target="_blank" class="kw-tag">${k.trim()}</a>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
    }

    function drawRadarChart(counts) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if (radarChartInstance) radarChartInstance.destroy();
        radarChartInstance = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['實作力 (R)', '探究力 (I)', '藝術力 (A)', '社交力 (S)', '領導力 (E)', '常規力 (C)'],
                datasets: [{
                    label: '能力分布',
                    data: [counts.R, counts.I, counts.A, counts.S, counts.E, counts.C],
                    backgroundColor: 'rgba(255, 107, 107, 0.4)',
                    borderColor: '#FF6B6B',
                    pointBackgroundColor: '#FF6B6B',
                    borderWidth: 2
                }]
            },
            options: {
                scales: {
                    r: { beginAtZero: true, stepSize: 1, ticks: { display: false }, pointLabels: { font: { size: 14, weight: 'bold' } } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>

</body>
</html>
